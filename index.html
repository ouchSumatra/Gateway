<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Forensic Platform - Presentation Display</title>
    <style>
        :root {
            --bg-dark: #070a13;
            --panel-bg: rgba(22, 27, 34, 0.95);
            --border-glow: #30363d;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --alert-amber: #d29922;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        /* Simulated Interactive GIS Map Canvas */
        #forensic-map-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #11192e 0%, #070a13 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }
        .map-placeholder-text {
            text-align: center;
            color: var(--text-muted);
            pointer-events: none;
        }
        .map-grid-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        /* Forensic Dialogue Modal Styles triggered by interact.js */
        .forensic-dialogue-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(7, 10, 19, 0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }
        .forensic-dialogue-hidden {
            display: none;
        }
        .dialogue-card {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-glow);
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.15);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            box-sizing: border-box;
        }
        .dialogue-card h3 {
            margin-top: 0;
            font-size: 1.3rem;
            color: var(--alert-amber);
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }
        .hook-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 25px;
        }
        .dialogue-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-dialogue-path {
            width: 100%;
            padding: 14px;
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid var(--border-glow);
            border-radius: 6px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-dialogue-path:hover {
            background-color: #30363d;
            border-color: #58a6ff;
        }
        /* Follow-up Capture Area */
        .followup-hidden { display: none; }
        .followup-visible {
            margin-top: 20px;
            border-top: 1px solid #30363d;
            padding-top: 20px;
            animation: slideDown 0.2s ease-out;
        }
        .followup-prompt {
            font-size: 0.95rem;
            color: #58a6ff;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 100px;
            background-color: #0d1117;
            color: var(--text-main);
            border: 1px solid #30363d;
            border-radius: 6px;
            box-sizing: border-box;
            padding: 12px;
            font-family: inherit;
            resize: none;
            margin-bottom: 15px;
        }
        .btn-lock-ledger {
            background-color: #238636;
            color: white;
            border: 1px solid #2ea44f;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .success-confirmation {
            color: #39ff14;
            font-weight: bold;
            text-align: center;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="forensic-map-canvas">
        <div class="map-grid-lines"></div>
        <div class="map-placeholder-text">
            <h2 id="map-status-header">🛰️ GATEWAY FORENSIC MATRIX INITIALIZED</h2>
            <p id="map-status-subtext">Awaiting remote command link down the realtime channel...</p>
        </div>
    </div>

    <div id="dialogue-presentation-container" class="forensic-dialogue-hidden"></div>

    <script type="module">
        import { PresentationInteractionEngine } from './interact.js';

        // Initialize display engine listening to the Newark stream
        const displayEngine = new PresentationInteractionEngine('newark');
        displayEngine.initPresentationView();

        // Visual helper hook to display state transitions beneath the map canvas
        const statusHeader = document.getElementById('map-status-header');
        const statusSubtext = document.getElementById('map-status-subtext');

        // Hook into the shared communication channel to change the background map state instantly
        displayEngine.orchestrator.listenAndSyncPresentation((stage, target) => {
            if (stage === 'VOC_PLUME_OVERLAY') {
                document.getElementById('forensic-map-canvas').style.background = "radial-gradient(circle at center, #1b2611 0%, #070a13 100%)";
                statusHeader.innerText = "📈 ACTIVE NEWARK VOC PLUME OVERLAY";
                statusSubtext.innerText = "Displaying continuous spatial diffusion models mapped to subsurface trackside aquifers.";
            } else if (stage === 'STANDARD_VIEW') {
                document.getElementById('forensic-map-canvas').style.background = "radial-gradient(circle at center, #11192e 0%, #070a13 100%)";
                statusHeader.innerText = "🛰️ GATEWAY FORENSIC MATRIX INITIALIZED";
                statusSubtext.innerText = "Awaiting remote command link down the realtime channel...";
            }
        });
    </script>
</body>
</html>
